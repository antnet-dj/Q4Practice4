<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practice 4</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body {
        height: 100vh;
        background: linear-gradient(-45deg, #89f7fe, #66a6ff, #ff9a9e, #fad0c4);
        background-size: 400% 400%;
        animation: gradientBG 10s ease infinite;
    }

    @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .glass-card {
        position: relative;
        width: 300px;
        padding: 25px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.3);
        overflow: hidden;
    }

    .glass-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: -75%;
        width: 50%;
        height: 100%;
        background: linear-gradient(
            120deg,
            transparent,
            rgba(255, 255, 255, 0.6),
            transparent
        );
        transform: skewX(-20deg);
        animation: shine 3s infinite;
    }

    @keyframes shine {
        0% { left: -75%; }
        100% { left: 125%; }
    }

    .form-control {
        border-radius: 10px;
        transition: 0.3s;
    }

    .form-control:focus {
        border-color: #66a6ff;
        box-shadow: 0 0 12px rgba(102, 166, 255, 0.9);
    }

    .btn-info {
        border-radius: 20px;
        transition: 0.3s;
    }

    .btn-info:hover {
        box-shadow: 0 0 10px #66a6ff,
                    0 0 20px #66a6ff,
                    0 0 40px #66a6ff;
        transform: scale(1.05);
    }

   .typing {
        display: inline-block;
        overflow: hidden;
        white-space: nowrap;
        border-right: 3px solid white;
        animation: typing 2s steps(10) forwards, blink 0.7s infinite;
    }

    @keyframes typing {
        from { width: 0; }
        to { width: 100%; }
    }

    @keyframes blink {
        50% { border-color: transparent; }
    }
</style>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="glass-card text-white">
        <h2 class="text-center mb-3 typing">Login Form</h2>

        <form>
            <label for="uname">Username</label>
            <input type="text" id="uname" class="form-control mb-3" placeholder="Enter here" required>

            <label for="pwd">Password</label>
            <input type="password" id="pwd" class="form-control mb-3" placeholder="Enter here" required>

            <input type="button" id="loginBTN" value="Login"
                class="btn btn-info w-100 mt-2" onclick="authenticate()">
        </form>

        <p id="display" class="mt-2 text-center"></p>
    </div>
</div>

<script>
    let attempt_counter = 0;

    function authenticate(){
        let username = document.getElementById("uname").value;
        let pwd = document.getElementById("pwd").value;

        let granted = "Welcome " + username + "!";
        let denied = "Access denied. Account locked after 3 attempts!";

        if (username === "rainbowdash" && pwd === "applejack") {
            alert(granted);
            attempt_counter = 0;
            document.getElementById("display").innerHTML = "";
            window.location.href = "dashboard.html";
        } 
        
        else {
            attempt_counter++;
            document.getElementById("display").innerHTML =
                "Incorrect username and/or password. Attempt " + attempt_counter + " of 3";

            if (attempt_counter >= 3) {
                alert(denied);
                document.getElementById("loginBTN").disabled = true;
            }
        }
    }
</script>

</body>
</html>
