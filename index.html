<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practice 4</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body {
        background: linear-gradient(135deg, #89f7fe, #66a6ff);
        height: 100vh;
    }

    .glass-card {
        width: 300px;
        padding: 25px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .form-control:focus {
        border-color: #66a6ff;
        box-shadow: 0 0 10px rgba(102, 166, 255, 0.8);
    }

    .form-control {
        border-radius: 10px;
    }

    .btn-info {
        border-radius: 20px;
    }
</style>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="glass-card text-white">
        <h2 class="text-center mb-3">Login Form</h2>

        <form>
            <label for="uname">Username</label>
            <input type="text" id="uname" class="form-control mb-3" placeholder="Enter here" required>

            <label for="pwd">Password</label>
            <input type="password" id="pwd" class="form-control mb-3" placeholder="Enter here" required>

            <input type="button" id="loginBTN" value="Login"
                class="btn btn-info w-100 mt-2" onclick="authenticate()">
        </form>

        <p id="display" class="mt-2 text-center"></p>
    </div>
</div>

<script>
    let attempt_counter = 0;

    function authenticate(){
        let username = document.getElementById("uname").value;
        let pwd = document.getElementById("pwd").value;

        let granted = "Welcome " + username + "!";
        let denied = "Access denied. Account locked after 3 attempts!";

        if (username === "rainbowdash" && pwd === "applejack") {
            alert(granted);
            attempt_counter = 0;
            document.getElementById("display").innerHTML = "";
            window.location.href = "dashboard.html";
        } 
        
        else {
            attempt_counter++;
            document.getElementById("display").innerHTML =
                "Incorrect username and/or password. Attempt " + attempt_counter + " of 3";

            if (attempt_counter >= 3) {
                alert(denied);
                document.getElementById("loginBTN").disabled = true;
            }
        }
    }
</script>

</body>
</html>
